version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: careagent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: careagent
      POSTGRES_PASSWORD: careagent_dev
      POSTGRES_DB: careagent_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: careagent_mlflow
    restart: unless-stopped
    ports:
      - "5002:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  mlflow_data:
